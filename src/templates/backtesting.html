<!DOCTYPE html>
<html lang="en">
<head>
  <title>Backtesting - {{short_code}}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/knockout@3.5.1/build/output/knockout-latest.js"></script>
  <script src="https://cdn.plot.ly/plotly-basic-3.0.0.min.js"></script>
  <script src="/static/js/backtest_results.js"></script>
  <style>
    body {
      font-family: 'Courier New', monospace;
    }
    .table td, .table th {
      padding-left: 0.25em!important;
      padding-right: 0.25em!important;
    }
    .dbd-sort-th { cursor: pointer; white-space: nowrap; }
    .dbd-sort-th:hover { text-decoration: underline; }
  </style>
  <script>
    $(function() {
      // Set default dates: end date = today, start date = 1 month back
      const today = new Date();
      const oneMonthAgo = new Date();
      oneMonthAgo.setMonth(today.getMonth() - 1);

      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      $('#startDate').val(formatDate(oneMonthAgo));
      $('#endDate').val(formatDate(today));

      const AGGRESSIVE_PREFIX = '[aggressive mode] ';
      $('#aggressiveMode').on('change', function() {
        const $comment = $('#comment');
        let val = $comment.val();
        if (this.checked) {
          if (!val.startsWith(AGGRESSIVE_PREFIX)) {
            $comment.val(AGGRESSIVE_PREFIX + val);
          }
        } else {
          if (val.startsWith(AGGRESSIVE_PREFIX)) {
            $comment.val(val.slice(AGGRESSIVE_PREFIX.length));
          }
        }
      });

      const shortCode = "{{short_code}}";
      const vm = makeBacktestVM(shortCode);
      ko.applyBindings(vm, document.getElementById('ko-root'));

      $('#backtestForm').on('submit', function(e) {
        e.preventDefault();

        const startDate = $('#startDate').val();
        const endDate = $('#endDate').val();

        if (startDate && endDate && startDate > endDate) {
          vm.statusMessage('<div class="alert alert-danger"><strong>Error:</strong> Start date must be less than or equal to end date.</div>');
          return;
        }

        const formData = new FormData(this);
        vm.results(null);
        vm.statusMessage('<div class="alert alert-info">Running backtest... <span id="pollStatus"></span></div>');

        $.ajax({
          url: `/backtesting/${shortCode}`,
          type: 'POST',
          data: formData,
          processData: false,
          contentType: false,
          success: function(response) {
            if (response.run_id) {
              // Async: poll for status
              const runId = response.run_id;
              let dots = 0;
              const pollInterval = setInterval(function() {
                dots = (dots + 1) % 4;
                $('#pollStatus').text('.'.repeat(dots + 1));
                $.ajax({
                  url: `/backtesting/${shortCode}/status/${runId}`,
                  type: 'GET',
                  success: function(statusResp) {
                    if (statusResp.status === 'done') {
                      clearInterval(pollInterval);
                      if (statusResp.results) {
                        vm.statusMessage('<div class="alert alert-info">Computing results...</div>');
                        fetchAndRenderResults(shortCode, statusResp.results, vm);
                      } else {
                        vm.statusMessage('<div class="alert alert-warning">Backtesting completed but no results available.</div>');
                      }
                    } else if (statusResp.status === 'error') {
                      clearInterval(pollInterval);
                      vm.statusMessage('<div class="alert alert-danger"><strong>Error:</strong> ' + statusResp.error + '</div>');
                    }
                    // status === 'running': keep polling
                  },
                  error: function(xhr) {
                    clearInterval(pollInterval);
                    const errorMsg = xhr.responseJSON ? xhr.responseJSON.error : 'Failed to get backtest status';
                    vm.statusMessage('<div class="alert alert-danger"><strong>Error:</strong> ' + errorMsg + '</div>');
                  }
                });
              }, 3000);
              return;
            }

            // Legacy sync response (fallback)
            if (response.success && response.results) {
              fetchAndRenderResults(shortCode, response.results, vm);
            } else {
              vm.statusMessage('<div class="alert alert-danger"><strong>Error:</strong> ' + (response.message || 'Unknown error') + '</div>');
            }
          },
          error: function(xhr) {
            const errorMsg = xhr.responseJSON ? xhr.responseJSON.error : 'Request failed';
            const redirectUrl = xhr.responseJSON ? xhr.responseJSON.redirect : null;
            if (redirectUrl) {
              window.location.href = redirectUrl;
            } else {
              vm.statusMessage('<div class="alert alert-danger"><strong>Error:</strong> ' + errorMsg + '</div>');
            }
          }
        });
      });
    });
  </script>
</head>
<body class="p-2">
  <div class="container-fluid font-monospace">
    <div class="row justify-content-center">
      <div class="col-12">
        <div class="row bg-light">
          <div class="card my-1">
            <h5 class="text-center">Backtesting - {{short_code}}</h5>
          </div>
        </div>

        <div class="row gx-0 my-3">
          <div class="col text-center">
            <a href="/me/{{short_code}}" class="btn btn-primary mx-2">Home</a>
            <a href="/history/{{short_code}}" class="btn btn-secondary mx-2">History</a>
            <a href="/backtesting/{{short_code}}/history" class="btn btn-outline-secondary mx-2">Backtest History</a>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">Backtesting Configuration</h6>
                <form id="backtestForm">
                  <div class="mb-3">
                    <label for="algoSelect" class="form-label">Select Algorithm:</label>
                    <select id="algoSelect" name="algo" class="form-select" required>
                      <option value="">-- Choose an algorithm --</option>
                      {% for algo in available_algos %}
                      <option value="{{algo}}">{{algo}}</option>
                      {% endfor %}
                    </select>
                  </div>
                  <div class="mb-3">
                    <label for="startDate" class="form-label">Start Date:</label>
                    <input type="date" id="startDate" name="start_date" class="form-control" required />
                  </div>
                  <div class="mb-3">
                    <label for="endDate" class="form-label">End Date:</label>
                    <input type="date" id="endDate" name="end_date" class="form-control" required />
                  </div>
                  <div class="mb-3">
                    <label for="comment" class="form-label">Comment:</label>
                    <input type="text" id="comment" name="comment" class="form-control" placeholder="e.g. testing ATM strike change" required />
                  </div>
                  <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="aggressiveMode" name="aggressive_mode" />
                    <label class="form-check-label" for="aggressiveMode">Aggressive Mode <small class="text-muted">(fill at candle high/low instead of close)</small></label>
                  </div>
                  <button type="submit" class="btn btn-primary">Run Backtest</button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <!-- KO-bound results area (also wraps the modal at bottom of body) -->
        <div id="ko-root">
          <!-- Status / error messages (rendered as raw HTML) -->
          <div data-bind="html: statusMessage"></div>

          {% include '_backtest_results_body.html' %}

          {% include '_trade_details_modal.html' %}
        </div><!-- #ko-root -->

      </div>
    </div>
  </div>
</body>
</html>
